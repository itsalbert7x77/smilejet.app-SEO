[build]
  publish = "."

# Clean URL redirects by destination (city-level first, then country-level)
[[redirects]]
  from = "/guides/vietnam/hanoi/*"
  to = "/articles/vietnam/hanoi/:splat.html"
  status = 200

[[redirects]]
  from = "/guides/vietnam/*"
  to = "/articles/vietnam/:splat.html"
  status = 200

[[redirects]]
  from = "/guides/thailand/*"
  to = "/articles/thailand/:splat.html"
  status = 200

[[redirects]]
  from = "/guides/mexico/*"
  to = "/articles/mexico/:splat.html"
  status = 200

[[redirects]]
  from = "/guides/general/*"
  to = "/articles/guides/:splat.html"
  status = 200

[[redirects]]
  from = "/guides"
  to = "/index.html"
  status = 200

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

# Cache static assets
[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000"
